<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASRDates - Welcome</title>
    <link rel="stylesheet" href="start.css">
</head>
<body>

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR4NpmSxNQ9oyP241ABWMZofrK2Xxt7H6FQPMTz3isEKqCkTliMM3jo5F5f&s=10">

<div class="landing-container">

    <div class="welcome-section">
        <h1>Welcome to ASRDates ❤️</h1>
        <p>
            The ultimate site to meet new and friendly ASRJCians,
            connect with others and have meaningful conversations. <br><br>
            You've met Artemis, Helios, Poseidon and Athena - Now meet,
            Aphrodite, the Goddess of Love
            <br>Four houses. One match ❤️
        </p>
        <button onclick="showRegister()">Join Now</button>
    </div>

    <div class="register-section" id="registerBox">
        <h2>Create Your Profile</h2>

        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email Address">
        <input type="text" placeholder="Class (e.g. 27/15)">
        
        <select>
            <option>Select House</option>
            <option>Helios 🐴</option>
            <option>Athena 🦉</option>
            <option>Artemis 🏹</option>
            <option>Poseidon 🌊</option>
        </select>

        <input type="text" placeholder="CCA">

        <button class="register-btn" onclick="enterSite()">Register</button>
    </div>

</div>

<script>
function showRegister() {
    document.getElementById("registerBox").style.display = "flex";
}

function enterSite() {
    window.location.href = "asrjc_datingsite.html";
}
</script>

</body>
</html>
