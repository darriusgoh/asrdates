<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASRDates - Welcome</title>
    <link rel="stylesheet" href="start.css">
</head>
<body>

<img src="https://instagram.fsin3-1.fna.fbcdn.net/v/t51.82787-15/537644328_18301890955216533_3264302616124578292_n.jpg?stp=dst-jpg_e35_tt6&_nc_cat=108&ig_cache_key=MzcwNDYwNzg4NTM4MTgwOTI2Nw%3D%3D.3-ccb7-5&ccb=7-5&_nc_sid=58cdad&efg=eyJ2ZW5jb2RlX3RhZyI6InhwaWRzLjE0NDB4OTYwLnNkci5DMyJ9&_nc_ohc=0CWqd4nmetcQ7kNvwEgAGlu&_nc_oc=AdkFsBmytmhoU_0CRDySJUMeoFHoFnxpWMpd3m-HR-s05w6uswt0-Nh5m6W7_YonORs&_nc_ad=z-m&_nc_cid=0&_nc_zt=23&_nc_ht=instagram.fsin3-1.fna&_nc_gid=k4IUMii-6fQyA2PdjQPpkw&oh=00_AfuSZxCqYO_yxfCcngDbbz7w-SxLwYKGbURcHrjcr8Xiyw&oe=69A4A171">

<div class="landing-container">

    <div class="welcome-section">
        <h1>Welcome to ASRDates ❤️</h1>
        <p>
            The ultimate site to meet new and friendly ASRJCians,
            connect with others and have meaningful conversations. <br><br>
            You've met Artemis, Helios, Poseidon and Athena - Now meet,
            Aphrodite, the Goddess of Love
            <br>Four houses. One match ❤️
        </p>
        <button onclick="showRegister()">Join Now</button>
    </div>

    <div class="register-section" id="registerBox">
        <h2>Create Your Profile</h2>

        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email Address">
        <input type="text" placeholder="Class (e.g. 27/15)">
        
        <select>
            <option>Select House</option>
            <option>Helios 🐴</option>
            <option>Athena 🦉</option>
            <option>Artemis 🏹</option>
            <option>Poseidon 🌊</option>
        </select>

        <input type="text" placeholder="CCA">

        <button class="register-btn" onclick="enterSite()">Register</button>
    </div>

</div>

<script>
function showRegister() {
    document.getElementById("registerBox").style.display = "flex";
}

function enterSite() {
    window.location.href = "asrjc_datingsite.html";
}
</script>

</body>
</html>
