<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASRDates</title>
    <link rel="stylesheet" href="asrjc_datingsite.css">
    <script src="asrjc_datingsite.js"></script>
</head>

<body>

<div class="container">

    <div class="sidebar">
        <div class="sidebar">

            <img src="ASRDATES.png" alt="ASRDates Logo" class="sidebar-logo">
            <h2 class="sidebar-title">ASRDates ❤️</h2>
</div>

        <button class="nav-btn">🏠 Home</button>
        <button class="nav-btn">🔥 Matches</button>
        <button class="nav-btn">💬 Messages</button>
        <button class="nav-btn">👤 Profile</button>
        <button class="nav-btn">⚙ Settings</button>

    </div>

    <div class="main">
        <div class="card" id="profiletinder">
            <img src="ASRDATES.png" alt="Profile">

            <div class="info">
                <div class="name">Click any button to begin</div>
                <div class="house"></div>
                <div class="bio">
                </div>
            </div>

            <div class="buttons">
                <button class="btn nope">✕</button>
                <button class="btn like">❤</button>
                <button class="btn drool">🤤</button>
            </div>
        </div>
    </div>

    <div class="rightbar">

        <h2>Your Profile</h2>

        <div class="profile-card">
            <img src="darrius.png" alt="Your Profile">
            <p><strong>Darrius</strong></p>
            <p>Your Preferences: Athena 🦉 · JC1 · Female</p>
        </div>

        <div class="settings-panel">
            <h3>Quick Commands</h3>

            <button class="setting-btn">Edit Profile</button>
            <button class="setting-btn logout">Unread Messages (32) </button>
            <button class="setting-btn">Change Preferences</button>
            <button class="setting-btn">Privacy</button>
            <a href="start.html"><button class="setting-btn logout">Logout</button></a>
        </div>
    </div>

</div>

<footer>
    <div class="footer-content">
        <h2>ASRDates 2026 ©</h2>
        <p>Discere, Coniungere – Non Solum. Dating only allowed after school hours.</p>
    </div>
</footer>

</body>
</html>
